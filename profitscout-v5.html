<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ProfitScout AI v5 - ULTIMATE</title>
<meta name="theme-color" content="#0a0e27">
<link rel="manifest" href="data:application/json,{'name':'ProfitScout AI','short_name':'ProfitScout','start_url':'.','display':'standalone','background_color':'#0a0e27','theme_color':'#0a0e27','icons':[{'src':'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==','sizes':'192x192','type':'image/png'}]}">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e27;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding-bottom:70px}
.header{background:linear-gradient(135deg,#1e3c72,#2a5298);padding:15px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-size:20px;font-weight:700}
.tabs{display:flex;background:#151932;position:fixed;bottom:0;width:100%;border-top:1px solid #2a2f45}
.tab{flex:1;padding:12px;text-align:center;font-size:11px;border:none;background:none;color:#888;cursor:pointer}
.tab.active{color:#4fc3f7;border-top:2px solid #4fc3f7}
.content{padding:15px;display:none}
.content.active{display:block}
.card{background:#151932;border-radius:12px;padding:15px;margin-bottom:15px;border:1px solid #2a2f45}
.btn{background:#4fc3f7;color:#0a0e27;border:none;padding:12px 20px;border-radius:8px;font-weight:600;width:100%;margin-top:10px}
.stock-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #2a2f45}
.stock-item:last-child{border-bottom:none}
.positive{color:#4caf50}
.negative{color:#f44336}
#chart{height:400px;margin:10px 0}
.signal-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;margin-left:5px}
.signal-badge.bull{background:#1b5e20;color:#4caf50}
.signal-badge.bear{background:#b71c1c;color:#f44336}
.alert-banner{background:#b71c1c;padding:10px;text-align:center;font-weight:700;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
input{background:#0a0e27;border:1px solid #2a2f45;color:#e0e0e0;padding:10px;border-radius:8px;width:100%;margin:5px 0}
</style>
</head>
<body>
<div class="header"><h1>🚀 ProfitScout AI v5 ULTIMATE</h1></div>
<div id="home" class="content active">
  <div class="card">
    <h3>🔥 Live Scanner</h3>
    <div id="chart"></div>
    <input id="tickerInput" placeholder="Enter ticker: SNDL" value="SNDL">
    <button class="btn" onclick="loadChart()">Load Chart + Signals</button>
  </div>
  <div class="card">
    <h3>🚨 God Mode Signals</h3>
    <div id="godSignals">Tap "Scan Now" below</div>
    <button class="btn" onclick="godScan()">Scan All 12 Signals</button>
  </div>
  <div class="card">
    <h3>📊 WSB Trending</h3>
    <div id="trending"></div>
  </div>
</div>
<div id="alerts" class="content">
  <div class="card">
    <h3>🔔 Alert Center</h3>
    <input id="alertTicker" placeholder="Ticker">
    <input id="alertPrice" placeholder="Price above" type="number">
    <button class="btn" onclick="testAlert()">Test All Channels</button>
    <div id="alertStatus" style="margin-top:10px;font-size:12px"></div>
  </div>
</div>
<div id="settings" class="content">
  <div class="card">
    <h3>⚙️ API Endpoints</h3>
    <input id="scraperUrl" placeholder="Railway Scraper URL">
    <input id="agentUrl" placeholder="Railway Agent URL">
    <button class="btn" onclick="saveSettings()">Save</button>
  </div>
  <div class="card">
    <h3>💝 Support Development</h3>
    <button class="btn" onclick="window.open('https://cash.app/$wallacethomas78')">CashApp $wallacethomas78</button>
    <button class="btn" onclick="window.open('https://www.paypal.com/paypalme/wallacethomas78')">PayPal</button>
    <button class="btn" onclick="window.open('https://ko-fi.com/wallacethomas78')">Ko-fi</button>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="showTab('home')">🏠 Home</button>
  <button class="tab" onclick="showTab('alerts')">🔔 Alerts</button>
  <button class="tab" onclick="showTab('settings')">⚙️ Settings</button>
</div>
<script>
let chart,candleSeries,volumeSeries;
let SCRAPER_URL=localStorage.getItem('scraperUrl')||'';
let AGENT_URL=localStorage.getItem('agentUrl')||'';
function showTab(tab){document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(tab).classList.add('active');event.target.classList.add('active')}
function saveSettings(){SCRAPER_URL=document.getElementById('scraperUrl').value;AGENT_URL=document.getElementById('agentUrl').value;localStorage.setItem('scraperUrl',SCRAPER_URL);localStorage.setItem('agentUrl',AGENT_URL);alert('Saved!')}
async function initChart(){const chartDiv=document.getElementById('chart');chart=LightweightCharts.createChart(chartDiv,{width:chartDiv.clientWidth,height:400,layout:{background:{color:'#151932'},textColor:'#e0e0e0'},grid:{vertLines:{color:'#2a2f45'},horzLines:{color:'#2a2f45'}},crosshair:{mode:LightweightCharts.CrosshairMode.Normal},rightPriceScale:{borderColor:'#2a2f45'},timeScale:{borderColor:'#2a2f45',timeVisible:true}});candleSeries=chart.addCandlestickSeries({upColor:'#4caf50',downColor:'#f44336',borderDownColor:'#f44336',borderUpColor:'#4caf50',wickDownColor:'#f44336',wickUpColor:'#4caf50'});volumeSeries=chart.addHistogramSeries({color:'#26a69a',priceFormat:{type:'volume'},priceScaleId:'',scaleMargins:{top:0.8,bottom:0}})}
async function loadChart(){if(!SCRAPER_URL){alert('Set Scraper URL in Settings');return}const ticker=document.getElementById('tickerInput').value.toUpperCase();if(!chart)await initChart();const res=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=3mo`);const data=await res.json();const quotes=data.chart.result[0];const timestamps=quotes.timestamp;const ohlc=quotes.indicators.quote[0];const vol=quotes.indicators.quote[0].volume;const candleData=timestamps.map((t,i)=>({time:t,open:ohlc.open[i],high:ohlc.high[i],low:ohlc.low[i],close:ohlc.close[i]})).filter(d=>d.open);const volumeData=timestamps.map((t,i)=>({time:t,value:vol[i],color:candleData[i]?.close>candleData[i]?.open?'#4caf5080':'#f4433680'})).filter(d=>d.value);candleSeries.setData(candleData);volumeSeries.setData(volumeData);const ta=await fetch(`${SCRAPER_URL}/api/ta/${ticker}`).then(r=>r.json());const signals=ta.signals||[];document.getElementById('godSignals').innerHTML=signals.map(s=>`<div class="stock-item">${s}</div>`).join('')||'No signals'}
async function godScan(){if(!SCRAPER_URL){alert('Set Scraper URL');return}document.getElementById('godSignals').innerHTML='Scanning 12 signals...';const ticker=document.getElementById('tickerInput').value.toUpperCase();const endpoints=['reddit-sentiment','twitter-sentiment','google-trends','sec-insider','unusual-options','wikipedia-trends','ta'];const results=await Promise.all(endpoints.map(ep=>fetch(`${SCRAPER_URL}/api/${ep}/${ticker}`).then(r=>r.json()).catch(()=>null)));let html='';const checks=[[results[0]?.total_mentions>25,'🔥 WSB: '+results[0]?.total_mentions+' mentions'],[results[1]?.sentiment==='Bullish','🐦 Twitter: Bullish'],[results[2]?.spike_detected,'📈 Google: +'+results[2]?.percent_change+'%'],[results[3]?.insider_buying,'💼 SEC: Insider Buying'],[results[4]?.unusual?.length>0,'🎰 Options: Unusual Activity'],[results[5]?.spike,'📚 Wikipedia: Pageview Spike'],[results[6]?.signals?.length>0,'📊 TA: '+results[6]?.signals?.join(', ')]];let signalCount=0;checks.forEach(([pass,text])=>{if(pass){signalCount++;html+=`<div class="stock-item">${text} <span class="signal-badge bull">FIRING</span></div>`}});if
